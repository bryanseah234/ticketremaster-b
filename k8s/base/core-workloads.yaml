apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ticketremaster-core
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 5000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ticketremaster-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: ticketremaster
    spec:
      priorityClassName: ticketremaster-standard
      initContainers:
        - name: wait-for-user-service-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z user-service-db.ticketremaster-data.svc.cluster.local 5432; do sleep 5; done
      containers:
        - name: user-service
          image: ticketremaster/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: core-runtime
            - secretRef:
                name: core-secrets
          env:
            - name: USER_SERVICE_DB_HOST
              value: user-service-db.ticketremaster-data.svc.cluster.local
            - name: USER_SERVICE_DB_PORT
              value: "5432"
            - name: USER_SERVICE_DB_NAME
              value: user_service
            - name: USER_SERVICE_DB_USER
              value: ticketremaster
            - name: USER_SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-data-secrets
                  key: USER_SERVICE_DB_PASSWORD
            - name: USER_SERVICE_DATABASE_URL
              value: postgresql://$(USER_SERVICE_DB_USER):$(USER_SERVICE_DB_PASSWORD)@$(USER_SERVICE_DB_HOST):$(USER_SERVICE_DB_PORT)/$(USER_SERVICE_DB_NAME)
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
