apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: ticketremaster-edge
spec:
  selector:
    app: kong
  ports:
    - name: proxy
      port: 80
      targetPort: proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: ticketremaster-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
        app.kubernetes.io/part-of: ticketremaster
    spec:
      priorityClassName: ticketremaster-critical
      containers:
        - name: kong
          image: kong:3.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 8000
            - name: admin
              containerPort: 8001
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/declarative/kong.yml
            - name: KONG_PROXY_LISTEN
              value: 0.0.0.0:8000
            - name: KONG_ADMIN_LISTEN
              value: 127.0.0.1:8001
            - name: KONG_LOG_LEVEL
              value: info
            - name: KONG_TRUSTED_IPS
              value: 0.0.0.0/0,::/0
            - name: KONG_REAL_IP_HEADER
              value: X-Forwarded-For
            - name: KONG_REAL_IP_RECURSIVE
              value: "on"
            # Increase proxy timeouts for complex aggregations
            - name: KONG_PROXY_READ_TIMEOUT
              value: "30s"
            - name: KONG_PROXY_SEND_TIMEOUT
              value: "30s"
            - name: KONG_PROXY_CONNECT_TIMEOUT
              value: "10s"
          volumeMounts:
            - name: kong-config
              mountPath: /kong/declarative
              readOnly: true
          readinessProbe:
            exec:
              command:
                - kong
                - health
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - kong
                - health
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: kong-config
          configMap:
            name: kong-declarative-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ticketremaster-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        app.kubernetes.io/part-of: ticketremaster
    spec:
      priorityClassName: ticketremaster-critical
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --protocol
            - http2
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(CLOUDFLARE_TUNNEL_TOKEN)
          env:
            - name: CLOUDFLARE_TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: edge-secrets
                  key: CLOUDFLARE_TUNNEL_TOKEN
          ports:
            - name: metrics
              containerPort: 2000
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
