apiVersion: v1
kind: ServiceAccount
metadata:
  name: seed-job-waiter
  namespace: ticketremaster-core
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seed-job-waiter
  namespace: ticketremaster-core
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seed-job-waiter
  namespace: ticketremaster-core
subjects:
  - kind: ServiceAccount
    name: seed-job-waiter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: seed-job-waiter
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-venues
  namespace: ticketremaster-core
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: seed-venues
    spec:
      restartPolicy: Never
      priorityClassName: ticketremaster-standard
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z venue-service-db.ticketremaster-data.svc.cluster.local 5432; do sleep 5; done
              until wget -qO- http://venue-service.ticketremaster-core.svc.cluster.local:5000/health; do sleep 5; done
      containers:
        - name: seed-venues
          image: ticketremaster/venue-service:local-k8s-20260329
          imagePullPolicy: IfNotPresent
          command: ["python", "seed_venues.py"]
          envFrom:
            - configMapRef:
                name: core-runtime
          env:
            - name: VENUE_SERVICE_DB_HOST
              value: venue-service-db.ticketremaster-data.svc.cluster.local
            - name: VENUE_SERVICE_DB_PORT
              value: "5432"
            - name: VENUE_SERVICE_DB_NAME
              value: venue_service
            - name: VENUE_SERVICE_DB_USER
              value: ticketremaster
            - name: VENUE_SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-data-secrets
                  key: VENUE_SERVICE_DB_PASSWORD
            - name: VENUE_SERVICE_DATABASE_URL
              value: postgresql://$(VENUE_SERVICE_DB_USER):$(VENUE_SERVICE_DB_PASSWORD)@$(VENUE_SERVICE_DB_HOST):$(VENUE_SERVICE_DB_PORT)/$(VENUE_SERVICE_DB_NAME)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-events
  namespace: ticketremaster-core
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: seed-events
    spec:
      restartPolicy: Never
      serviceAccountName: seed-job-waiter
      priorityClassName: ticketremaster-standard
      initContainers:
        - name: wait-for-seed-venues
          image: rancher/kubectl:v1.32.0
          command: ["kubectl", "wait", "--namespace=ticketremaster-core", "--for=condition=complete", "--timeout=1h", "job/seed-venues"]
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z event-service-db.ticketremaster-data.svc.cluster.local 5432; do sleep 5; done
              until wget -qO- http://event-service.ticketremaster-core.svc.cluster.local:5000/health; do sleep 5; done
      containers:
        - name: seed-events
          image: ticketremaster/event-service:local-k8s-20260329
          imagePullPolicy: IfNotPresent
          command: ["python", "seed_events.py"]
          envFrom:
            - configMapRef:
                name: core-runtime
          env:
            - name: EVENT_SERVICE_DB_HOST
              value: event-service-db.ticketremaster-data.svc.cluster.local
            - name: EVENT_SERVICE_DB_PORT
              value: "5432"
            - name: EVENT_SERVICE_DB_NAME
              value: event_service
            - name: EVENT_SERVICE_DB_USER
              value: ticketremaster
            - name: EVENT_SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-data-secrets
                  key: EVENT_SERVICE_DB_PASSWORD
            - name: EVENT_SERVICE_DATABASE_URL
              value: postgresql://$(EVENT_SERVICE_DB_USER):$(EVENT_SERVICE_DB_PASSWORD)@$(EVENT_SERVICE_DB_HOST):$(EVENT_SERVICE_DB_PORT)/$(EVENT_SERVICE_DB_NAME)
---
