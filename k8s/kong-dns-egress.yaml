apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kong-dns-egress
  namespace: ticketremaster-edge
spec:
  podSelector:
    matchLabels:
      app: kong
  policyTypes:
    - Egress
  egress:
    # Allow DNS to kube-dns pods in kube-system
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Allow DNS to kube-dns service IP (10.96.0.10)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.96.0.10/32
