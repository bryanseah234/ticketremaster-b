name: ticketremaster

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - ticketremaster

x-postgres-defaults: &postgres-defaults
  image: postgres:18-alpine
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - ticketremaster
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s

services:
  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
    ports:
      - "5000:5000"
    environment:
      USER_SERVICE_DATABASE_URL: ${USER_SERVICE_DATABASE_URL:-postgresql://ticketremaster:change_me@user-service-db:5432/user_service}
    depends_on:
      user-service-db:
        condition: service_healthy

  user-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${USER_SERVICE_DB_NAME:-user_service}
      POSTGRES_USER: ${USER_SERVICE_DB_USER:-ticketremaster}
      POSTGRES_PASSWORD: ${USER_SERVICE_DB_PASSWORD:-change_me}
    volumes:
      - user-service-db-data:/var/lib/postgresql/data

  event-service:
    <<: *service-defaults
    build:
      context: ./services/event-service
    ports:
      - "5002:5000"
    environment:
      EVENT_SERVICE_DATABASE_URL: ${EVENT_SERVICE_DATABASE_URL}
    depends_on:
      event-service-db:
        condition: service_healthy

  event-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${EVENT_SERVICE_DB_NAME}
      POSTGRES_USER: ${EVENT_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${EVENT_SERVICE_DB_PASSWORD}
    volumes:
      - event-service-db-data:/var/lib/postgresql/data

networks:
  ticketremaster:
    driver: bridge

volumes:
  user-service-db-data:
  event-service-db-data:

