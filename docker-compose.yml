name: ticketremaster

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - ticketremaster

x-flask-healthcheck: &flask-healthcheck
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 15s

x-postgres-defaults: &postgres-defaults
  image: postgres:18-alpine
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - ticketremaster
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s

services:
  user-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/user-service
    ports:
      - "5000:5000"
    environment:
      USER_SERVICE_DATABASE_URL: ${USER_SERVICE_DATABASE_URL:-postgresql://ticketremaster:change_me@user-service-db:5432/user_service}
    depends_on:
      user-service-db:
        condition: service_healthy

  user-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${USER_SERVICE_DB_NAME:-user_service}
      POSTGRES_USER: ${USER_SERVICE_DB_USER:-ticketremaster}
      POSTGRES_PASSWORD: ${USER_SERVICE_DB_PASSWORD:-change_me}
    volumes:
      - user-service-db-data:/var/lib/postgresql/data

  event-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/event-service
    ports:
      - "5002:5000"
    environment:
      EVENT_SERVICE_DATABASE_URL: ${EVENT_SERVICE_DATABASE_URL}
    depends_on:
      event-service-db:
        condition: service_healthy

  event-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${EVENT_SERVICE_DB_NAME}
      POSTGRES_USER: ${EVENT_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${EVENT_SERVICE_DB_PASSWORD}
    volumes:
      - event-service-db-data:/var/lib/postgresql/data

  seat-inventory-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/seat-inventory-service
    ports:
      - "5003:5000"
      - "50051:50051"
    environment:
      SEAT_INVENTORY_SERVICE_DATABASE_URL: ${SEAT_INVENTORY_SERVICE_DATABASE_URL}
      SEAT_INVENTORY_GRPC_PORT: ${SEAT_INVENTORY_GRPC_PORT:-50051}
    depends_on:
      seat-inventory-service-db:
        condition: service_healthy

  seat-inventory-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${SEAT_INVENTORY_SERVICE_DB_NAME}
      POSTGRES_USER: ${SEAT_INVENTORY_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${SEAT_INVENTORY_SERVICE_DB_PASSWORD}
    volumes:
      - seat-inventory-service-db-data:/var/lib/postgresql/data

  ticket-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/ticket-service
    ports:
      - "5004:5000"
    environment:
      TICKET_SERVICE_DATABASE_URL: ${TICKET_SERVICE_DATABASE_URL}
    depends_on:
      ticket-service-db:
        condition: service_healthy

  ticket-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${TICKET_SERVICE_DB_NAME}
      POSTGRES_USER: ${TICKET_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${TICKET_SERVICE_DB_PASSWORD}
    volumes:
      - ticket-service-db-data:/var/lib/postgresql/data

  ticket-log-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/ticket-log-service
    ports:
      - "5005:5000"
    environment:
      TICKET_LOG_SERVICE_DATABASE_URL: ${TICKET_LOG_SERVICE_DATABASE_URL}
    depends_on:
      ticket-log-service-db:
        condition: service_healthy

  ticket-log-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${TICKET_LOG_SERVICE_DB_NAME}
      POSTGRES_USER: ${TICKET_LOG_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${TICKET_LOG_SERVICE_DB_PASSWORD}
    volumes:
      - ticket-log-service-db-data:/var/lib/postgresql/data

  marketplace-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/marketplace-service
    ports:
      - "5006:5000"
    environment:
      MARKETPLACE_SERVICE_DATABASE_URL: ${MARKETPLACE_SERVICE_DATABASE_URL}
    depends_on:
      marketplace-service-db:
        condition: service_healthy

  marketplace-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${MARKETPLACE_SERVICE_DB_NAME}
      POSTGRES_USER: ${MARKETPLACE_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${MARKETPLACE_SERVICE_DB_PASSWORD}
    volumes:
      - marketplace-service-db-data:/var/lib/postgresql/data

  transfer-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/transfer-service
    ports:
      - "5007:5000"
    environment:
      TRANSFER_SERVICE_DATABASE_URL: ${TRANSFER_SERVICE_DATABASE_URL}
    depends_on:
      transfer-service-db:
        condition: service_healthy

  transfer-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${TRANSFER_SERVICE_DB_NAME}
      POSTGRES_USER: ${TRANSFER_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${TRANSFER_SERVICE_DB_PASSWORD}
    volumes:
      - transfer-service-db-data:/var/lib/postgresql/data

  venue-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/venue-service
    ports:
      - "5008:5000"
    environment:
      VENUE_SERVICE_DATABASE_URL: ${VENUE_SERVICE_DATABASE_URL}
    depends_on:
      venue-service-db:
        condition: service_healthy

  venue-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${VENUE_SERVICE_DB_NAME}
      POSTGRES_USER: ${VENUE_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${VENUE_SERVICE_DB_PASSWORD}
    volumes:
      - venue-service-db-data:/var/lib/postgresql/data

  seat-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/seat-service
    ports:
      - "5009:5000"
    environment:
      SEAT_SERVICE_DATABASE_URL: ${SEAT_SERVICE_DATABASE_URL}
    depends_on:
      seat-service-db:
        condition: service_healthy

  seat-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${SEAT_SERVICE_DB_NAME}
      POSTGRES_USER: ${SEAT_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${SEAT_SERVICE_DB_PASSWORD}
    volumes:
      - seat-service-db-data:/var/lib/postgresql/data

  credit-transaction-service:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/credit-transaction-service
    ports:
      - "5010:5000"
    environment:
      CREDIT_TRANSACTION_SERVICE_DATABASE_URL: ${CREDIT_TRANSACTION_SERVICE_DATABASE_URL}
    depends_on:
      credit-transaction-service-db:
        condition: service_healthy

  credit-transaction-service-db:
    <<: *postgres-defaults
    environment:
      POSTGRES_DB: ${CREDIT_TRANSACTION_SERVICE_DB_NAME}
      POSTGRES_USER: ${CREDIT_TRANSACTION_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${CREDIT_TRANSACTION_SERVICE_DB_PASSWORD}
    volumes:
      - credit-transaction-service-db-data:/var/lib/postgresql/data

  stripe-wrapper:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/stripe-wrapper
    ports:
      - "5011:5000"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

  otp-wrapper:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./services/otp-wrapper
    ports:
      - "5012:5000"
    environment:
      SMU_API_URL: ${SMU_API_URL}
      SMU_API_KEY: ${SMU_API_KEY}

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    networks:
      - ticketremaster
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  auth-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/auth-orchestrator
    ports:
      - "6000:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:5000
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL}
      OUTSYSTEMS_API_KEY: ${OUTSYSTEMS_API_KEY}
    depends_on:
      user-service:
        condition: service_healthy

  event-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/event-orchestrator
    ports:
      - "6001:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      EVENT_SERVICE_URL: http://event-service:5000
      VENUE_SERVICE_URL: http://venue-service:5000
      SEAT_SERVICE_URL: http://seat-service:5000
      SEAT_INVENTORY_SERVICE_URL: http://seat-inventory-service:5000
    depends_on:
      event-service:
        condition: service_healthy
      venue-service:
        condition: service_healthy
      seat-service:
        condition: service_healthy
      seat-inventory-service:
        condition: service_healthy

  credit-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/credit-orchestrator
    ports:
      - "6002:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL}
      OUTSYSTEMS_API_KEY: ${OUTSYSTEMS_API_KEY}
      STRIPE_WRAPPER_URL: http://stripe-wrapper:5000
      CREDIT_TRANSACTION_SERVICE_URL: http://credit-transaction-service:5000
    depends_on:
      credit-transaction-service:
        condition: service_healthy
      stripe-wrapper:
        condition: service_healthy

  ticket-purchase-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/ticket-purchase-orchestrator
    ports:
      - "6003:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SEAT_INVENTORY_GRPC_HOST: seat-inventory-service
      SEAT_INVENTORY_GRPC_PORT: ${SEAT_INVENTORY_GRPC_PORT:-50051}
      SEAT_INVENTORY_SERVICE_URL: http://seat-inventory-service:5000
      TICKET_SERVICE_URL: http://ticket-service:5000
      EVENT_SERVICE_URL: http://event-service:5000
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL}
      OUTSYSTEMS_API_KEY: ${OUTSYSTEMS_API_KEY}
      CREDIT_TRANSACTION_SERVICE_URL: http://credit-transaction-service:5000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      SEAT_HOLD_DURATION_SECONDS: ${SEAT_HOLD_DURATION_SECONDS:-600}
    depends_on:
      ticket-service:
        condition: service_healthy
      seat-inventory-service:
        condition: service_healthy
      credit-transaction-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  qr-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/qr-orchestrator
    ports:
      - "6004:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      QR_SECRET: ${QR_SECRET}
      QR_TTL_SECONDS: ${QR_TTL_SECONDS:-60}
      TICKET_SERVICE_URL: http://ticket-service:5000
      EVENT_SERVICE_URL: http://event-service:5000
      VENUE_SERVICE_URL: http://venue-service:5000
      SEAT_INVENTORY_SERVICE_URL: http://seat-inventory-service:5000
    depends_on:
      ticket-service:
        condition: service_healthy

  marketplace-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/marketplace-orchestrator
    ports:
      - "6005:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      TICKET_SERVICE_URL: http://ticket-service:5000
      MARKETPLACE_SERVICE_URL: http://marketplace-service:5000
      EVENT_SERVICE_URL: http://event-service:5000
      VENUE_SERVICE_URL: http://venue-service:5000
      SEAT_INVENTORY_SERVICE_URL: http://seat-inventory-service:5000
    depends_on:
      ticket-service:
        condition: service_healthy
      marketplace-service:
        condition: service_healthy

  transfer-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/transfer-orchestrator
    ports:
      - "6007:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      MARKETPLACE_SERVICE_URL: http://marketplace-service:5000
      TRANSFER_SERVICE_URL: http://transfer-service:5000
      OTP_WRAPPER_URL: http://otp-wrapper:5000
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL}
      OUTSYSTEMS_API_KEY: ${OUTSYSTEMS_API_KEY}
      CREDIT_TRANSACTION_SERVICE_URL: http://credit-transaction-service:5000
      TICKET_SERVICE_URL: http://ticket-service:5000
      USER_SERVICE_URL: http://user-service:5000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
    depends_on:
      transfer-service:
        condition: service_healthy
      marketplace-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
      credit-transaction-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otp-wrapper:
        condition: service_healthy

  ticket-verification-orchestrator:
    <<: [*service-defaults, *flask-healthcheck]
    build:
      context: ./orchestrators/ticket-verification-orchestrator
    ports:
      - "6008:5000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      QR_TTL_SECONDS: ${QR_TTL_SECONDS:-60}
      TICKET_SERVICE_URL: http://ticket-service:5000
      TICKET_LOG_SERVICE_URL: http://ticket-log-service:5000
      EVENT_SERVICE_URL: http://event-service:5000
      VENUE_SERVICE_URL: http://venue-service:5000
      SEAT_INVENTORY_SERVICE_URL: http://seat-inventory-service:5000
    depends_on:
      ticket-service:
        condition: service_healthy
      ticket-log-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      venue-service:
        condition: service_healthy
      seat-inventory-service:
        condition: service_healthy


networks:
  ticketremaster:
    driver: bridge

volumes:
  user-service-db-data:
  event-service-db-data:
  seat-inventory-service-db-data:
  ticket-service-db-data:
  ticket-log-service-db-data:
  marketplace-service-db-data:
  transfer-service-db-data:
  venue-service-db-data:
  seat-service-db-data:
  credit-transaction-service-db-data:
  rabbitmq-data: