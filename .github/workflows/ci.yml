name: CI — Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install repository dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          while IFS= read -r -d '' file; do
            pip install -r "$file"
          done < <(find services orchestrators shared -name requirements.txt -print0)

      - name: Run repo lint script
        run: python scripts/lint_repo.py

  typecheck:
    name: Typecheck Python Code
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install repository dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          while IFS= read -r -d '' file; do
            pip install -r "$file"
          done < <(find services orchestrators shared -name requirements.txt -print0)

      - name: Run repo typecheck script
        run: python scripts/typecheck_repo.py

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install repository dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          while IFS= read -r -d '' file; do
            pip install -r "$file"
          done < <(find services orchestrators shared -name requirements.txt -print0)

      - name: Run repo-root pytest
        run: python -m pytest -q

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build all Docker images
        run: |
          docker compose build --no-cache 2>&1 || true
          echo "Docker build check complete"
